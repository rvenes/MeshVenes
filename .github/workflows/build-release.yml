name: CI MeshVenes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    env:
      CONFIGURATION: Release
      TARGET_FRAMEWORK: net8.0-windows10.0.19041.0
      RUNTIME: win-x64
      PROJECT_PATH: MeshVenes/MeshVenes.csproj
      PUBLISH_DIR: ${{ github.workspace }}\artifacts\publish\win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Resolve build target
        id: target
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter *.sln -File | Select-Object -First 1
          if ($null -ne $sln) {
            "restore_target=$($sln.FullName)" >> $env:GITHUB_OUTPUT
            "build_target=$($sln.FullName)" >> $env:GITHUB_OUTPUT
          } else {
            $project = Join-Path $env:GITHUB_WORKSPACE $env:PROJECT_PATH
            "restore_target=$project" >> $env:GITHUB_OUTPUT
            "build_target=$project" >> $env:GITHUB_OUTPUT
          }

      - name: Restore
        shell: pwsh
        run: dotnet restore "${{ steps.target.outputs.restore_target }}" -r $env:RUNTIME -p:Platform=x64

      - name: Build (Release)
        shell: pwsh
        run: dotnet build "${{ steps.target.outputs.build_target }}" -c $env:CONFIGURATION -p:Platform=x64 --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test MeshVenes.Tests/MeshVenes.Tests.csproj -c $env:CONFIGURATION -p:Platform=x64

      - name: Validate self-contained win-x64 publish
        shell: pwsh
        run: |
          dotnet publish $env:PROJECT_PATH `
            -c $env:CONFIGURATION `
            -f $env:TARGET_FRAMEWORK `
            -r $env:RUNTIME `
            -p:Platform=x64 `
            --self-contained true `
            --no-restore `
            /p:PublishReadyToRun=false `
            -o $env:PUBLISH_DIR
